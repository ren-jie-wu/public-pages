<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>盐湖城—黄石—大提顿 7天6晚行程</title>
  <meta name="description" content="2026年7月盐湖城、黄石国家公园与大提顿国家公园7天6晚自驾行程，含逐日真实地图、路线、住宿、准备清单与注意事项。">
  <meta property="og:title" content="盐湖城—黄石—大提顿 7天6晚行程">
  <meta property="og:description" content="逐日自驾路线、真实地图、景点安排、住宿和准备清单。">
  <meta property="og:type" content="website">
  <style>
    html, body { margin: 0; min-height: 100%; background: #fff; }
    #loading {
      max-width: 760px;
      margin: 15vh auto;
      padding: 24px;
      color: #475569;
      font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      text-align: center;
    }
  </style>
</head>
<body>
  <main id="content">
    <div id="loading">正在载入行程与路线地图…</div>
  </main>
  <script>
  (() => {
    "use strict";

    const ARCHIVE_COMMIT = "92c5df1c24fa6d0611ceda99e5bc07b255754e38";
    const ARCHIVE_URLS = [
      `https://raw.githubusercontent.com/ren-jie-wu/public-pages/${ARCHIVE_COMMIT}/yellowstone-trip/index.html`,
      `https://cdn.jsdelivr.net/gh/ren-jie-wu/public-pages@${ARCHIVE_COMMIT}/yellowstone-trip/index.html`
    ];

    const mapDays = [
      {
        day: 1,
        title: "7/9｜抵达盐湖城",
        subtitle: "机场取车后，按到达时间选择市区方案或 Antelope Island 方案。",
        embedUrl: "https://www.google.com/maps/d/u/0/embed?mid=1XixH0GqXY8KUk3rT1B3a7VRo6FCvnik&ehbc=2E312F&noprof=1"
      },
      {
        day: 2,
        title: "7/10｜SLC → West Yellowstone → 大棱镜一带",
        subtitle: "长途北上，抵达后从西门进入黄石；下午游览 Midway 与 Lower Geyser Basin。",
        embedUrl: "https://www.google.com/maps/d/u/0/embed?mid=1EMj1MBLmDoZ6ZyyCWrpAbbDpDMPbtpA&ehbc=2E312F&noprof=1"
      },
      {
        day: 3,
        title: "7/11｜Old Faithful + Upper Geyser Basin",
        subtitle: "西门往返 Old Faithful；Upper Geyser Basin 内部以步行为主。",
        embedUrl: "https://www.google.com/maps/d/u/0/embed?mid=1aqPI-rzf1T7lrsA7wVL5pFiVlSoDl8o&ehbc=2E312F&noprof=1"
      },
      {
        day: 4,
        title: "7/12｜Norris → Mammoth → Lamar Valley → Gardiner",
        subtitle: "退房后沿黄石北部单向移动，傍晚从 Lamar Valley 返回 Gardiner。",
        embedUrl: ""
      },
      {
        day: 5,
        title: "7/13｜峡谷与湖区 → Grand Teton",
        subtitle: "从 Gardiner 南下，经 Canyon、Hayden、Mud Volcano、West Thumb 后进入大提顿。",
        embedUrl: ""
      },
      {
        day: 6,
        title: "7/14｜Grand Teton → Salt Lake City",
        subtitle: "清晨游览大提顿核心景点，下午沿 US-89 / I-15 返回 SLC Airport。",
        embedUrl: ""
      },
      {
        day: 7,
        title: "7/15｜返程",
        subtitle: "以机场为核心；只有晚班机且时间充足时才补盐湖城市区。",
        embedUrl: "https://www.google.com/maps/d/u/0/embed?mid=1H2yT_J3OA8xm2Sv2OzZHCdZh628PQEg&ehbc=2E312F&noprof=1"
      }
    ];

    async function fetchFirst(urls) {
      let lastError;
      for (const url of urls) {
        try {
          const response = await fetch(url, { cache: "force-cache" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return await response.text();
        } catch (error) {
          lastError = error;
        }
      }
      throw lastError || new Error("无法载入归档行程");
    }

    function addOverrideStyles() {
      const style = document.createElement("style");
      style.id = "yellowstone-enhancements";
      style.textContent = `
        :root {
          --text: #1f2937;
          --muted: #5b6472;
          --line: #d7dde5;
          --soft: #f6f8fb;
          --accent: #2f6ea5;
          --accent-soft: #eaf3fb;
          --warning: #9a5b13;
          --warning-soft: #fff8e8;
        }
        html { scroll-behavior: smooth; background: #fff !important; }
        body {
          max-width: 960px !important;
          margin: 0 auto !important;
          padding: 32px 24px 72px !important;
          box-sizing: border-box !important;
          font-size: 16px !important;
          line-height: 1.65 !important;
          color: var(--text) !important;
          background: #fff !important;
          overflow-wrap: anywhere;
        }
        h1 {
          font-size: 32px !important;
          margin: 0.25em 0 0.45em !important;
          padding-bottom: 0.28em !important;
        }
        h2 {
          font-size: 23px !important;
          margin: 1.45em 0 0.55em !important;
          padding-left: 0.55em !important;
        }
        h3 { font-size: 18px !important; margin: 1em 0 0.38em !important; }
        h4 { font-size: 16px !important; }
        p, ul, ol { margin: 0.38em 0 0.75em !important; }
        li { margin: 0.18em 0 !important; }
        table {
          display: table !important;
          width: 100% !important;
          font-size: 14px !important;
          overflow: visible !important;
        }
        th, td { padding: 9px 10px !important; }
        details {
          margin: 0.8em 0 1em !important;
          padding: 0.65em 0.8em !important;
        }
        summary { cursor: pointer !important; }
        img {
          max-height: 420px !important;
          display: block;
          margin-left: auto !important;
          margin-right: auto !important;
        }
        figcaption { text-align: center; color: var(--muted); font-size: 0.86em; }
        .updated-note {
          margin: 0.8em 0 1.25em !important;
          color: var(--muted);
          font-size: 0.9em;
        }
        .travel-alert {
          margin: 0.9em 0 1.05em;
          padding: 0.8em 1em;
          border: 1px solid #efd7a8;
          border-left: 4px solid #d28b2c;
          border-radius: 8px;
          background: var(--warning-soft);
          color: #65410e;
        }
        .travel-alert strong { color: #65410e !important; }
        .route-map-card {
          margin: 1em 0 1.35em;
          padding: 0;
          overflow: hidden;
          border: 1px solid #dbe4ee;
          border-radius: 12px;
          background: #fbfdff;
          break-inside: avoid;
          box-shadow: 0 5px 18px rgba(31, 41, 55, 0.06);
        }
        .route-map-head {
          padding: 14px 16px 10px;
          border-bottom: 1px solid #e5ebf2;
        }
        .route-map-head h3 {
          margin: 0 0 3px !important;
          color: #1f3f5b !important;
        }
        .route-map-head p {
          margin: 0 !important;
          color: var(--muted);
          font-size: 0.9em;
        }
        .route-map-embed {
          position: relative;
          width: 100%;
          aspect-ratio: 4 / 3;
          overflow: hidden;
          background: #eef3f7;
        }
        .route-map-embed iframe {
          display: block;
          width: 100%;
          height: 100%;
          border: 0;
        }
        .route-map-foot {
          display: grid;
          gap: 10px;
          padding: 12px 16px 14px;
          border-top: 1px solid #e5ebf2;
        }
        .map-note {
          margin: 0 !important;
          color: var(--muted);
          font-size: 0.78em;
        }
        @media (max-width: 680px) {
          body {
            padding: 18px 15px 52px !important;
            font-size: 15px !important;
            line-height: 1.62 !important;
          }
          h1 { font-size: 27px !important; }
          h2 { font-size: 21px !important; }
          h3 { font-size: 17px !important; }
          table { display: block !important; overflow-x: auto !important; font-size: 13px !important; }
          .route-map-embed { aspect-ratio: 4 / 3; }
          .route-map-head, .route-map-foot { padding-left: 12px; padding-right: 12px; }
        }
        @media print {
          body {
            max-width: none !important;
            padding: 0 4mm !important;
            font-size: 11.2px !important;
            line-height: 1.4 !important;
          }
          h1 { font-size: 23px !important; }
          h2 { font-size: 17px !important; margin-top: 1em !important; }
          h3 { font-size: 14px !important; }
          table { font-size: 11px !important; }
          .route-map-embed { aspect-ratio: 4 / 3; }
          .route-map-card { box-shadow: none; }
        }
      `;
      document.head.appendChild(style);
    }

    function sectionElements(day) {
      const anchor = document.getElementById(`day${day}`);
      const end = document.getElementById(`day${day + 1}`);
      if (!anchor) return [];
      const startBlock = anchor.closest("p") || anchor;
      const endBlock = end ? (end.closest("p") || end) : null;
      const elements = [];
      let node = startBlock.nextElementSibling;
      while (node && node !== endBlock) {
        elements.push(node);
        node = node.nextElementSibling;
      }
      return elements;
    }

    function findInSection(day, selector, predicate) {
      for (const root of sectionElements(day)) {
        if (root.matches?.(selector) && predicate(root)) return root;
        const found = [...root.querySelectorAll?.(selector) || []].find(predicate);
        if (found) return found;
      }
      return null;
    }

    function makeAlert(html) {
      const box = document.createElement("aside");
      box.className = "travel-alert";
      box.innerHTML = html;
      return box;
    }

    function insertAlertAfter(target, html) {
      if (target) target.insertAdjacentElement("afterend", makeAlert(html));
    }

    function insertAlertBefore(target, html) {
      if (target) target.insertAdjacentElement("beforebegin", makeAlert(html));
    }

    function replaceTextIn(root, from, to) {
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
      const nodes = [];
      while (walker.nextNode()) nodes.push(walker.currentNode);
      nodes.forEach(node => {
        if (node.nodeValue.includes(from)) node.nodeValue = node.nodeValue.split(from).join(to);
      });
    }

    function removeMatchingBlocks(day, patterns) {
      const roots = sectionElements(day);
      roots.forEach(root => {
        const candidates = [
          ...(root.matches?.("li,p,h3,h4") ? [root] : []),
          ...root.querySelectorAll?.("li,p,h3,h4") || []
        ];
        candidates.forEach(el => {
          if (patterns.some(pattern => el.textContent.toLowerCase().includes(pattern.toLowerCase()))) {
            el.remove();
          }
        });
      });
      document.querySelectorAll("ul:empty, ol:empty").forEach(el => el.remove());
    }

    function applyContentCorrections() {
      document.documentElement.lang = "zh-CN";
      document.title = "盐湖城—黄石—大提顿 7天6晚行程";

      const firstTitle = document.querySelector("h1");
      const intro = firstTitle?.nextElementSibling;
      if (intro) {
        const note = document.createElement("p");
        note.className = "updated-note";
        note.innerHTML = "<strong>最后更新：2026年6月22日。</strong> 公园道路、步道和野生动物临时关闭情况，请在出发前一晚及每天入园前再次核对。";
        intro.insertAdjacentElement("afterend", note);
      }

      const day2Intensity = findInSection(2, "p", el => el.textContent.includes("驾驶强度"));
      insertAlertAfter(day2Intensity,
        "<strong>开放状态提醒：</strong> Grand Prismatic Overlook 使用 Fairy Falls Trailhead 一带的步道。该区域可能因熊或其他野生动物活动临时关闭；7月9日晚和7月10日入园前需核对 Yellowstone Current Conditions。"
      );

      const day3Afternoon = findInSection(3, "h3", el => el.textContent.includes("下午二选一"));
      insertAlertAfter(day3Afternoon,
        "<strong>徒步方案不是固定可用：</strong> Mystic Falls、Fairy Falls 与 Biscuit Basin 均应在当天确认开放后再前往。若仍关闭，直接采用 Black Sand Basin、Old Faithful Inn 或等待其他可预测喷泉的轻松方案。"
      );

      sectionElements(5).forEach(root => {
        replaceTextIn(root, "再删 Tower/非核心观景点", "再删 Fishing Bridge、Jackson Lake 或其他非核心短停");
        replaceTextIn(root, "Tower/非核心观景点", "Fishing Bridge、Jackson Lake 或其他非核心短停");
      });
      const day5Lodging = findInSection(5, "h3", el => el.textContent.includes("住宿"));
      insertAlertBefore(day5Lodging,
        "<strong>住宿执行建议：</strong> Moran / Colter Bay 明显优于 Jackson，可减少长日末尾继续向南驾驶的距离；Jackson 仅在房价或房源明显更合适时采用。"
      );

      sectionElements(5).forEach(root => {
        replaceTextIn(root,
          "Colter Bay（短暂停留；Kayak 移至 7/14 可选活动）",
          "Colter Bay（仅在时间充足时短暂停留）"
        );
      });

      const kayakParagraph = findInSection(6, "p", el => el.textContent.toLowerCase().includes("colter bay kayak"));
      if (kayakParagraph) {
        const possibleList = kayakParagraph.nextElementSibling;
        if (possibleList?.matches("ul,ol")) possibleList.remove();
        kayakParagraph.remove();
      }
      const day6Afternoon = findInSection(6, "h3", el => el.textContent.includes("下午景点与可选活动"));
      if (day6Afternoon) day6Afternoon.textContent = "下午景点";

      const day6Roadtrip = findInSection(6, "details", el => el.textContent.includes("沿途可选顺路停留"));
      if (day6Roadtrip) {
        day6Roadtrip.querySelectorAll("li").forEach(li => {
          if (li.textContent.includes("7/16")) li.remove();
        });
        const lavaHeading = [...day6Roadtrip.querySelectorAll("h3")].find(h => h.textContent.includes("Lava Hot Springs"));
        if (lavaHeading) {
          const following = lavaHeading.nextElementSibling;
          if (following?.matches("ul,ol")) following.remove();
          lavaHeading.remove();
        }
      }

      sectionElements(6).forEach(root => {
        replaceTextIn(root,
          "行程中预留至少30分钟机动时间",
          "Moose–Wilson Road 可能延误45分钟或更久；无明确需要时不要让导航自动带入该路段"
        );
      });

      const day6Intensity = findInSection(6, "p", el => el.textContent.includes("驾驶强度"));
      insertAlertAfter(day6Intensity,
        "<strong>返程时间线：</strong> 3:00 PM 作为离开 Grand Teton 的目标时间，4:00 PM 作为最晚时间。2026年施工期间避免让导航自动带入 Moose–Wilson Road；无明确需要时优先走 US-191 / Teton Park Road。"
      );

      document.querySelectorAll("body *").forEach(el => {
        if (el.children.length === 0 && el.textContent.includes("4. 确认租车保险")) {
          el.textContent = el.textContent.replace("4. 确认租车保险", "5. 确认租车保险");
        }
      });

      document.querySelectorAll("img").forEach((img, index) => {
        if (index > 0) img.loading = "lazy";
        img.decoding = "async";
      });
      document.querySelectorAll('a[href^="http"]').forEach(link => {
        link.target = "_blank";
        link.rel = "noopener noreferrer";
      });
    }

    function buildMapCards() {
      mapDays.forEach(day => {
        if (!day.embedUrl) return;

        const h2 = findInSection(day.day, "h2", () => true);
        if (!h2) return;

        const card = document.createElement("section");
        card.className = "route-map-card";
        card.id = `route-map-day-${day.day}`;
        card.innerHTML = `
          <div class="route-map-head">
            <h3>${day.title}｜路线地图</h3>
            <p>${day.subtitle}</p>
          </div>
          <div class="route-map-embed">
            <iframe
              src="${day.embedUrl}"
              title="${day.title}路线地图"
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
              allowfullscreen
            ></iframe>
          </div>
          <div class="route-map-foot">
            <p class="map-note">地图由 Google My Maps 提供。实际驾驶时请结合当天路况、NPS 道路状态和现场封路指示。</p>
          </div>
        `;

        const intensity = findInSection(day.day, "p", el => el.textContent.includes("驾驶强度"));
        (intensity || h2).insertAdjacentElement("afterend", card);
      });
    }

    async function start() {
      try {
        const archivedHtml = await fetchFirst(ARCHIVE_URLS);
        const parsed = new DOMParser().parseFromString(archivedHtml, "text/html");
        const content = document.getElementById("content");
        content.innerHTML = parsed.body.innerHTML;

        addOverrideStyles();
        applyContentCorrections();
        buildMapCards();
      } catch (error) {
        console.error(error);
        document.getElementById("content").innerHTML = `
          <div id="loading">
            <strong>行程正文暂时无法载入。</strong><br>
            可先查看
            <a href="https://github.com/ren-jie-wu/public-pages/blob/${ARCHIVE_COMMIT}/yellowstone-trip/index.html">
              GitHub 中的归档版本
            </a>。
          </div>
        `;
      }
    }

    start();
  })();
  </script>
</body>
</html>
