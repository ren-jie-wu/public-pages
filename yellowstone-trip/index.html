    async function fetchFirst(urls) {
      let lastError;
      for (const url of urls) {
        try {
          const response = await fetch(url, { cache: "force-cache" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return await response.text();
        } catch (error) {
          lastError = error;
        }
      }
      throw lastError || new Error("无法载入归档行程");

    function sectionElements(day) {
      const anchor = document.getElementById(`day${day}`);
      const end = document.getElementById(`day${day + 1}`);
      if (!anchor) return [];
      const startBlock = anchor.closest("p") || anchor;
      const endBlock = end ? (end.closest("p") || end) : null;
      const elements = [];
      let node = startBlock.nextElementSibling;
      while (node && node !== endBlock) {
        elements.push(node);
        node = node.nextElementSibling;
      }
      return elements;
    }

    function findInSection(day, selector, predicate) {
      for (const root of sectionElements(day)) {
        if (root.matches?.(selector) && predicate(root)) return root;
        const found = [...(root.querySelectorAll?.(selector) || [])].find(predicate);
        if (found) return found;
      }
      return null;
    }

    function makeAlert(html) {
      const box = document.createElement("aside");
      box.className = "travel-alert";
      box.innerHTML = html;
      return box;
    }

    function insertAlertAfter(target, html) {
      if (target) target.insertAdjacentElement("afterend", makeAlert(html));
    }

    function insertAlertBefore(target, html) {
      if (target) target.insertAdjacentElement("beforebegin", makeAlert(html));
    }

    function replaceTextIn(root, from, to) {
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
      const nodes = [];
      while (walker.nextNode()) nodes.push(walker.currentNode);
      nodes.forEach(node => {
        if (node.nodeValue.includes(from)) node.nodeValue = node.nodeValue.split(from).join(to);
      });
    }

    function removeMatchingBlocks(day, patterns) {
      const roots = sectionElements(day);
      roots.forEach(root => {
        const candidates = [
          ...(root.matches?.("li,p,h3,h4") ? [root] : []),
          ...(root.querySelectorAll?.("li,p,h3,h4") || [])
        ];
        candidates.forEach(el => {
          if (patterns.some(pattern => el.textContent.toLowerCase().includes(pattern.toLowerCase()))) {
            el.remove();
          }
        });
      });
      document.querySelectorAll("ul:empty, ol:empty").forEach(el => el.remove());
    }

    function pointLookup(day) {
      return new Map(day.points.map(([name, lat, lng]) => [name, { name, lat, lng }]));
    }

    function googleDirectionsUrl(stops, mode) {
      const params = new URLSearchParams({
        api: "1",
        origin: `${stops[0].lat},${stops[0].lng}`,
        destination: `${stops.at(-1).lat},${stops.at(-1).lng}`,
        travelmode: mode === "walking" ? "walking" : "driving"
      });
      if (stops.length > 2) {
        params.set("waypoints", stops.slice(1, -1).map(p => `${p.lat},${p.lng}`).join("|"));
      }
      return `https://www.google.com/maps/dir/?${params.toString()}`;
    }

    function buildMapCards() {
      mapDays.forEach(day => {
        const h2 = findInSection(day.day, "h2", () => true);
        if (!h2) return;

        const card = document.createElement("section");
        card.className = "route-map-card";
        card.id = `route-map-day-${day.day}`;

        const stopItems = day.points
          .map(([name], index) => `<li><strong>${index + 1}.</strong> ${name}</li>`)
          .join("");

        const lookup = pointLookup(day);
        const actionLinks = day.routes.map(route => {
          const stops = route.stopNames.map(name => lookup.get(name)).filter(Boolean);
          return `<a class="route-link" href="${googleDirectionsUrl(stops, route.mode)}" target="_blank" rel="noopener noreferrer">在 Google Maps 打开：${route.name}</a>`;
        }).join("");

        card.innerHTML = `
          <div class="route-map-head">
            <h3>${day.title}｜路线地图</h3>
            <p>${day.subtitle}</p>
          </div>
          <div class="route-map" id="leaflet-day-${day.day}" role="img" aria-label="${day.title}路线地图"></div>
          <div class="route-map-foot">
            <ol class="route-stop-list">${stopItems}</ol>
            <div class="route-actions">${actionLinks}</div>
            <p class="map-note">底图与道路数据：OpenStreetMap；路线线条由 OSRM 公共路由服务生成。地图用于行程总览，不替代当天导航、NPS 道路状态或现场封路指示。</p>
          </div>
        `;

        const intensity = findInSection(day.day, "p", el => el.textContent.includes("驾驶强度"));
        (intensity || h2).insertAdjacentElement("afterend", card);
      });
    }

    function markerIcon(number) {
      return L.divIcon({
        className: "numbered-marker",
        html: String(number),
        iconSize: [28, 28],
        iconAnchor: [14, 14],
        popupAnchor: [0, -15]
      });
    }

    async function osrmGeometry(stops) {
      const coordinates = stops.map(p => `${p.lng},${p.lat}`).join(";");
      const url = `https://router.project-osrm.org/route/v1/driving/${coordinates}?overview=full&geometries=geojson&steps=false`;
      const response = await fetch(url);
      if (!response.ok) throw new Error(`OSRM HTTP ${response.status}`);
      const data = await response.json();
      const coords = data.routes?.[0]?.geometry?.coordinates;
      if (!coords?.length) throw new Error("OSRM 未返回路线");
      return coords.map(([lng, lat]) => [lat, lng]);
    }

      const container = document.getElementById(`leaflet-day-${day.day}`);
      if (!container) return;
      if (!window.L) {
        container.innerHTML = '<div style="padding:24px;color:#5b6472">地图组件未能加载，请使用下方 Google Maps 路线链接。</div>';
        return;
      }

      const map = L.map(container, {
        scrollWheelZoom: false,
        zoomControl: true
      });
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
      }).addTo(map);

      const lookup = pointLookup(day);
      const bounds = L.latLngBounds([]);
      day.points.forEach(([name, lat, lng], index) => {
        L.marker([lat, lng], { icon: markerIcon(index + 1) })
          .addTo(map)
          .bindPopup(`<strong>${index + 1}. ${name}</strong>`);
        bounds.extend([lat, lng]);
      });

      const routeStyles = [
        { color: "#2f6ea5", weight: 5, opacity: 0.85 },
        { color: "#b46b1f", weight: 4, opacity: 0.85 }
      ];

      for (let index = 0; index < day.routes.length; index += 1) {
        const route = day.routes[index];
        const stops = route.stopNames.map(name => lookup.get(name)).filter(Boolean);
        if (stops.length < 2) continue;
        let latLngs = stops.map(p => [p.lat, p.lng]);
        if (!route.straight && route.mode !== "walking") {
          try {
            latLngs = await osrmGeometry(stops);
          } catch (error) {
            console.warn(`Day ${day.day} route fallback:`, error);
          }
        }
        const style = { ...routeStyles[index % routeStyles.length] };
        if (route.dash || route.mode === "walking") style.dashArray = "8 7";
        L.polyline(latLngs, style).addTo(map).bindTooltip(route.name);
        latLngs.forEach(point => bounds.extend(point));
      }

      if (bounds.isValid()) map.fitBounds(bounds.pad(0.12), { maxZoom: 12 });
      setTimeout(() => map.invalidateSize(), 80);
    }

    async function renderMaps() {
      for (const day of mapDays) {
        await renderOneMap(day);
      }
    }

    async function start() {
      try {
        const archivedHtml = await fetchFirst(ARCHIVE_URLS);
        const parsed = new DOMParser().parseFromString(archivedHtml, "text/html");
        const content = document.getElementById("content");
        content.innerHTML = parsed.body.innerHTML;

        addOverrideStyles();
        applyContentCorrections();
        buildMapCards();
        await renderMaps();
      } catch (error) {
        console.error(error);
        document.getElementById("content").innerHTML = `
          <div id="loading">
            <strong>行程正文暂时无法载入。</strong><br>
            可先查看
            <a href="https://github.com/ren-jie-wu/public-pages/blob/${ARCHIVE_COMMIT}/yellowstone-trip/index.html">
              GitHub 中的归档版本
            </a>。
          </div>
        `;
      }
    }

    start();
  })();
  </script>
</body>
</html>
